services:
  postgres:
    image: postgres:16-alpine
    container_name: tokentoast-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5430:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tokentoast-redis
    ports:
      - "6370:6370"

volumes:
  pgdata:

